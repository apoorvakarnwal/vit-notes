<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="radio" name="alp" id="a1">
    <label for="a1">a1</label>
    <input type="radio" name="alp" id="a2">
    <label for="a2">a2</label>

    <input type="submit" value="Submit" onclick="func();">
    <script>
        function func(){
            var a1=document.getElementById('a1');
            var a2=document.getElementById('a2');
             
            if(a1.checked==true){
                alert(`selected item is ${a1.id}`)
            }
            if(a2.checked==true){
                alert(`selected item is ${a2.id}`)
            }
            else{
                alert(`No value is selected.`);
            }
        }
    </script>
</body>
</html>
