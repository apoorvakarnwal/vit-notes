<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            padding-left: 20px;
            
        }
        #box{

            max-width: 500px;
            margin: 20px auto;
            background-color: #ffeedf;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            padding: 20px;
        }
        #submit{
            display: flex;
            background-color: rgb(16, 16, 165);
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 20px;
        }
        #submit:hover{
            background-color: rgba(16, 16, 165, 0.7);
        }
        #mySubmit{
            display: flex;
            justify-content: center;
        }

    </style>
</head>
<body>
    <div id="box">
        <h1>Theme park Registration</h1>
        <h2>Enter your Details</h2>
        <form id="myform" onsubmit="return validate();">
            <label for="age">Enter Age:</label>
            <input type="number" name="age" id="age">
            <br><br>
            <label for="cat">Entry Category</label>
            <br>
            <input type="radio" name="cat" id="college" value="College">
            <label for="college">College</label>
            <br>
            <input type="radio" name="cat" id="family" value="Family">
            <label for="family">Family</label>
            

            <br><br>
            <div id="mySubmit">
                <input type="submit" value="Submit" name="submit" id="submit">
            </div>

        </form>
        <p id="result"></p>
    </div>
    <script>
        function validate(){
            event.preventDefault();
            const age=document.getElementById("age").value;
            const category=document.querySelector('input[name="cat"]:checked').value;
            if(age==='' || category===''){
                return false;
            }
            if(age<0||age>120){
                alert("Please enter a valid age!");
            }

            var ageCategory='';
            var cost=0;
            if(age<12){
                ageCategory='Child';
                cost=300;
            }
            else if (age>=60){
                ageCategory='Senior';
                cost=450;
            }
            else{
                ageCategory='Adult';
                cost=400;
            }
            
            document.getElementById('result').innerHTML="Age category: "+ageCategory+"<br>Entry category: "+category+"<br>Cost: "+cost;

            document.getElementById("myform").reset();
            return true;
        }
    </script>
</body>
</html>
