<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Membership Form</title>
        <style>
            .box{
                padding: 20px;
                background-color: #c8edf9a0;
                max-width: 500px;
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
                margin: 50px auto;
                border-radius: 10px;
            }
            label{
                margin-bottom: 0px;
            }
            input[type="text"],input[type="tel"],input[type="email"]{
                margin-bottom: 10px;
                background-color: #ffeedf;
                border: 0.5px solid gray;
                border-radius: 3px;
                padding: 8px 10px;
                box-sizing: border-box;
            }
            .full{
                width: 100%;
            }
            .half {
                width: 49.5%;
            }

            body{
                font-family: Arial, Helvetica, sans-serif;
                color: #082451;
            }
            h1, h2{
                margin-top: 0px;
                font-weight: 100;
            }
            h2{
                margin-bottom: 15px;
            }
            label[name="plan"]{
                font-weight:lighter;
            }

            input[type="submit"]{
                background-color: #082451;
                border: none;
                color: white;
                padding: 8px 25px;
                border-radius: 50px;
                cursor: pointer;
            }
            input[type="submit"]:hover{
                background-color: rgba(08,36,81,0.8);
            }
            .submit-box{
                display: flex;
                justify-content: center;
            }
        </style>
    </head>
    <body>
        <div class="box">
            <form id="membership-form" onsubmit="return validate();">
                <h1>Associate Membership Form</h1>
                <h2>Member Information</h2>
                <label for="name">Name</label><br>
                <input class="half" type="text" id="fname" name="fname" placeholder="First">
                <input class="half" type="text" id="lname" name="lname" placeholder="Last"><br><br>

                <label for="address">Address</label><br>
                <input class="full" type="text" id="line1" name="line1" placeholder="Street Address"><br>
                <input class="full" type="text" id="line2" name="line2" placeholder="Street Address Line 2"><br>
                <input class="half" type="text" id="city" name="city" placeholder="City">
                <input class="half" type="text" id="region" name="region" placeholder="Region"><br>
                <input class="half" type="text" id="zip" name="zip" placeholder="Postal/Zipcode">
                <input class="half" type="text" id="country" name="country" placeholder="Country"><br><br>

                <label for="phone">Phone</label><br>
                <input class="full" type="tel" id="phone" name="tel" placeholder="Phone"><br><br>

                <label for="email">Email</label><br>
                <input class="full" type="email" id="email" name="email" placeholder="Email Address"><br><br>

                <label for="plan">Membership plan</label><br>
                
                <input type="radio" id="individual" name="plan">
                <label for="individual">Individual</label>
                <br>
                <input type="radio" id="family" name="plan">
                <label for="family">Family</label>
                <br>
                <input type="radio" id="student" name="plan">
                <label for="student">Student</label>
                <br>
                <input type="radio" id="educator" name="plan">
                <label for="educator">Educator</label>
                <br><br>

                <div class="submit-box"><input type="submit" value="SEND"></div>
                
                <div id="response" ></div>
            </form>
        </div>

        <script>
            function validate(){
                event.preventDefault();
                var fname= document.getElementById('fname').value;
                console.log(fname);
                var lname= document.getElementById('lname').value;
                var phone= document.getElementById('phone').value;
                var membership=document.getElementsByName('plan');
                var selectedPlan='';
                for(let i=0;i<membership.length;i++){
                    if(membership[i].checked == true){
                        selectedPlan=document.querySelector(`label[for="${membership[i].id}"]`).textContent;
                        break;
                    }
                }
                if (fname.trim() === '' || lname.trim() === '' || phone.trim() === '' || selectedPlan === '') {
                    alert('Please fill in all fields');
                    return false; // Validation failed, prevent form submission
                }
                var cost=0;
                switch (selectedPlan) {
                    case "Individual":
                        cost=10000;
                        break;
                    case "Family":
                        cost=25000;
                        break;
                    case "Student":
                        cost=5000;
                        break;
                    case "Educator":
                        cost=8000;
                        break;
                }
                document.getElementById("response").innerHTML=`<p>Name: ${fname} ${lname}
<br>Phone: ${phone}
<br>Membership: ${selectedPlan}
<br>Cost: ${cost}</p>`;
            // alert(`Name: ${fname} ${lname}
            // Phone: ${phone}
            // Membership: ${selectedPlan}
            // Cost: ${cost}`);

                document.getElementById("membership-form").reset();

                return true;
            }
        </script>
    </body>
</html>
