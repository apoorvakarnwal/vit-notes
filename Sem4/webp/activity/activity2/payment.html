<!DOCTYPE html>
<html lang="en">
<head>
    <title>Card Payment Page</title>
</head>
<body>
    <h2>Order Overview</h2>
    <form>
        <label for="payment-method">Select a payment method</label>
        <select name="payment-method" required>
            <option value="" disabled selected hidden>Select Payment Method</option>
            <option value="credit-card">Credit Card</option>
            <option value="debit-card">Debit Card</option>
        </select><br><br>
        
        <label for="first-name">First name</label>
        <input type="text" name="first-name" required><br><br>
    
        <label for="last-name">Last name</label>
        <input type="text" name="last-name" required><br><br>
    
        <label for="card-number">Credit / Debit Card</label>
        <input type="password" name="card-number"  required><br><br>
    
        <label for="cvv">CVV</label>
        <input type="password" name="cvv" required><br><br>
        
        <button type="submit">Make Payment</button>
    </form>
</body>
</html>
