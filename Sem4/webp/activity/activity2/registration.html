<!DOCTYPE html>
<html>
<head>
    <title>Registration</title>
</head>
<body style="margin-left: 10px;">
    <h2>Registration</h2>
    <form>
        <label for="fname">First Name:</label>
        <input type="text" id="fname" name="fname"><br><br>

        <label for="lname">Last Name:</label>
        <input type="text" id="lname" name="lname"><br><br>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password"><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email"><br><br>

        <label for="mobile">Phone No.:</label>
        <input type="tel" id="mobile" maxlength="10" name="mobile"><br><br>
        
        <label for="gender">Gender:</label>
        <input type="radio" id="male" name="gender" value="male">
        <label for="male">Male</label>
        <input type="radio" id="female" name="gender" value="female">
        <label for="female">Female</label><br><br>

        <label for="gender">Date of Birth: </label>
        <input type="date" id="date" name="date"><br><br>

        <label for="languages">Languages Known:</label>
        <input type="checkbox" id="languages" name="languages" value="English">
        <label for="English">English</label>
        <input type="checkbox" id="languages" name="languages" value="Hindi">
        <label for="Hindi">Hindi</label>
        <input type="checkbox" id="languages" name="languages" value="Tamil">
        <label for="Tamil">Tamil</label>
        <input type="checkbox" id="languages" name="languages" value="Telugu">
        <label for="Telugu">Telugu</label><br><br>

        <input type="submit" value="Submit">
        <input type="reset" value="Reset">
    </form>
</body>
</html>
