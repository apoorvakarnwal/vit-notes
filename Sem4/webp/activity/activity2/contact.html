<!DOCTYPE html>
<html lang="en">
<head>
    <title>Events Page</title>
    <style>
        input, textarea {
            padding: 4px;
            box-sizing: border-box;
        }

    </style>
</head>
<body>
    <h2>Contact Information</h2>
    <form method="post">
        <label width="560"  for="name">Name:</label>
        <input type="text" id="name" name="name" required><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required><br><br>

        <label for="message" style="vertical-align: top;">Message:</label>
        <textarea id="message" name="message" rows="3" required></textarea><br><br>

        <button type="submit" style="border-radius: 5px;background-color: #4CAF50;
        color: white;
        padding: 10px;
        border: none;">Submit</button>
        
    </form>
</body>
</html>
