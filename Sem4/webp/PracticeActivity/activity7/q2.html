<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #signatureCanvas{
            border : black solid 1px;
        }
    </style>
</head>
<body>
    <h2>Sign Here</h2>
    <canvas id="signatureCanvas" width="400" height="200"></canvas>
    <br>
    <label for="colorPicker">Select Color:</label>
    <input type="color" id="color">
    <br><br>
    <button onclick="clearSignature()">Clear Signature</button>
    
    <form id="signatureForm">
        <input type="hidden" id="signatureInput" name="signature" required>
        <button type="submit">Submit Signature</button>
    </form>

    <script>
        const canvas = document.getElementById('signatureCanvas');
        const ctx = canvas.getContext('2d');
        const mycolor = document.getElementById('color');
        let isDrawing = false;
        let color = mycolor.value;

        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseout', stopDrawing);
        mycolor.addEventListener('input', changeColor);

        function startDrawing(e) {
            isDrawing = true;
            draw(e);
        }

        function draw(e) {
            if (!isDrawing) return;
            ctx.lineWidth = 2;
            ctx.lineCap = 'round';
            ctx.strokeStyle = color;
            ctx.lineTo(e.clientX - canvas.offsetLeft, e.clientY - canvas.offsetTop);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(e.clientX - canvas.offsetLeft, e.clientY - canvas.offsetTop);
        }

        function stopDrawing() {
            isDrawing = false;
            document.getElementById('signatureInput').value = canvas.toDataURL();
        }

        function clearSignature() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            document.getElementById('signatureInput').value = '';
        }

        function changeColor() {
            color = document.getElementById('color').value;
        }
    </script>
</body>
</html>
