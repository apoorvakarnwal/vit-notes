<!DOCTYPE html>
<html lang="en">
<head>
    <title>Amusement Park Form</title>
    <link rel="stylesheet" href="./index.css">
</head>
<body>
    <div class="box">
        <form id="booking-form" ">
            <h1>Amuzement Park, New Delhi</h1>
            <h2>Book Now!!</h2>
            <label for="name">Name</label><br>
            <input class="half" type="text" id="fname" name="fname" placeholder="First">
            <input class="half" type="text" id="lname" name="lname" placeholder="Last"><br><br>

            <label for="age">Age</label><br>
            <input type="number" id="age" name="age" min="0" onchange="ageCheck()">
            <br>
            <p id="age-category">Age Category : </p>
            <br>


            <label for="entry">Entry Category</label><br>
            
            <input type="radio" id="college" name="entry">
            <label for="college">College</label>
            <br>
            <input type="radio" id="family" name="entry">
            <label for="family">Family</label>
            <br><br>


            <div class="submit-box"><input type="submit" value="Submit "></div>
            
            <div id="response" ></div>
        </form>
    </div>

    <script>
        function ageCheck(){
            let ageCategory = '';

            let age=Number(document.getElementById('age').value);
            if(age>=12 && age<=60){
                ageCategory='Adult';
            }
            else if(age>60){
                ageCategory='Senior';
            }
            else if(age<12){
                ageCategory='Child';
            }

            document.getElementById('age-category').innerHTML=`Age Category: ${ageCategory}`;
        }
    </script>
</body>
</html>
