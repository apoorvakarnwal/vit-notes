<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React Quiz</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .quiz {
            border: 1px solid #ccc;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .question {
            margin-bottom: 10px;
        }
        .input{
            width: 100%;
            padding: 10px;
            font-size: 16px;
        }
        .button {
            font-size: 16px;
            padding: 10px 20px;
            margin-top: 10px;
            cursor: pointer;
            background-color: #f0f0f0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .button:hover {
            background-color: #e0e0e0;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel">

        const { useState } = React;

        function Quiz() {
            const [answer1, setAnswer1] = useState(0);
            const [answer2, setAnswer2] = useState('');
            const [answer3, setAnswer3] = useState('');
            const [result1, setResult1] = useState('');
            const [result2, setResult2] = useState('');
            const [result3, setResult3] = useState('');

            const checkAnswer = (questionNumber) => {
                switch (questionNumber) {
                    case 1:
                        setResult1(answer1.toLowerCase() === 'react' ? 'Correct!' : 'Incorrect!');
                        break;
                    case 2:
                        setResult2(answer2.toLowerCase() === 'javascript' ? 'Correct!' : 'Incorrect!');
                        break;
                    case 3:
                        setResult3(answer3.toLowerCase() === 'html' ? 'Correct!' : 'Incorrect!');
                        break;
                    default:
                        break;
                }
            };
            return (
                <div className="quiz">
                    <div className="question">
                        <label>Question 1: What library is used for building user interfaces in React?</label>
                        <input
                            className="input"
                            type="text"
                            value={answer1}
                            onChange={(e) => setAnswer1(e.target.value)}
                        />
                        <button className="button" onClick={() => checkAnswer(1)}>Check Answer</button>
                        <div>{result1}</div>
                    </div>
                    <div className="question">
                        <label>Question 2: What programming language is primarily used with React?</label>
                        <input
                            className="input"
                            type="text"
                            value={answer2}
                            onChange={(e) => setAnswer2(e.target.value)}
                        />
                        <button className="button" onClick={() => checkAnswer(2)}>Check Answer</button>
                        <div>{result2}</div>
                    </div>
                    <div className="question">
                        <label>Question 3: What markup language is used to structure web pages?</label>
                        <input
                            className="input"
                            type="text"
                            value={answer3}
                            onChange={(e) => setAnswer3(e.target.value)}
                        />
                        <button className="button" onClick={() => checkAnswer(3)}>Check Answer</button>
                        <div>{result3}</div>
                    </div>
                </div>
            );
        }
        ReactDOM.render(<Quiz />, document.getElementById('root'));
    </script>
</body>
</html>
