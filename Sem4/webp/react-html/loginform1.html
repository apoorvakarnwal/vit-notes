<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Form</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
      }
      form {
        border: 1px solid #ccc;
        padding: 20px;
        border-radius: 5px;
        width: 300px;
      }
      input{
        width:100%;
        padding: 10px;
        margin: 5px 0;
        box-sizing: border-box;
      }
      button {
        width: 100%;
        padding: 10px;
        background-color: blue;
        color: white;
        border-radius: 5px;
      }
      .error {
        color: red;
      }
      .user-table {
        border-collapse: collapse;
        width: 100%;
      }
      .user-table th,
      .user-table td {
        border: 1px solid #000;
        padding: 8px;
        text-align: left;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel">
      const { useState } = React;

      const EducationalQualificationsForm = () => {
        const [name, setName] = useState("");
        const [degrees, setDegrees] = useState([]);
        const [errors, setErrors] = useState({});
        const [formData, setFormData] = useState(null);

        const handleInputChange = (e) => {
          const { name, value, checked } = e.target;
          if (name === "degrees") {
            if (checked) {
              setDegrees([...degrees, value]);
            } else {
              setDegrees(degrees.filter((degree) => degree !== value));
            }
          } else {
            setName(value);
          }
        };

        const handleSubmit = (e) => {
          e.preventDefault();
          if (!name && degrees.length === 0) {
            setErrors({
              name: "Name is required",
              degrees: "Please select at least one degree",
            });
            return;
          }
          if (!name) {
            setErrors({ name: "Name is required" });
            return;
          }
          if (degrees.length === 0) {
            setErrors({ degrees: "Please select at least one degree" });
            return;
          }
          setFormData({ name, degrees });
          setErrors({});
        };

        return (
          <div>
            <h2>Educational Qualifications Form</h2>
            <form onSubmit={handleSubmit}>
              <div>
                <label>Name:</label>
                <input type="text" name="name" value={name} onChange={handleInputChange}/>
                {errors.name && <span className="error">{errors.name}</span>}
              </div>
              <div>
                <label>Degrees:</label>
                <div>
                  <input type="checkbox" name="degrees" value="BTech" checked={degrees.includes("BTech")} onChange={handleInputChange}/>
                  <label>BTech</label>
                </div>
                <div>
                  <input type="checkbox" name="degrees" value="MTech" checked={degrees.includes("MTech")} onChange={handleInputChange} />
                  <label>MTech</label>
                </div>
                <div>
                  <input type="checkbox" name="degrees" value="PhD" checked={degrees.includes("PhD")} onChange={handleInputChange}/>
                  <label>PhD</label>
                </div>
                {errors.degrees && (
                  <span className="error">{errors.degrees}</span>
                )}
              </div>
              <button type="submit">Submit</button>
            </form>

            {formData && (
              <div>
                <h2>User Details</h2>
                <table className="user-table">
                  <thead>
                    <tr>
                      <th>Name</th>
                      <th>Degrees</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr>
                      <td>{formData.name}</td>
                      <td>{formData.degrees.join(", ")}</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            )}
          </div>
        );
      };

      ReactDOM.render(<EducationalQualificationsForm />, document.getElementById("root"));
    </script>
  </body>
</html>
