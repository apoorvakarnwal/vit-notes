<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        form {
            border: 1px solid #ccc;
            padding: 20px;
            border-radius: 5px;
            width: 300px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            box-sizing: border-box;
        }
        
        #c1{
            width: 20%;
        }

        #c2{
            width: 27%;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        .error {
            color: red;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel">
        function LoginForm() {
            const [username, setUsername] = React.useState('');
            const [password, setPassword] = React.useState('');
            const [confirmPassword, setConfirmPassword] = React.useState('');
            const [gender, setGender] = React.useState('');
            const [role, setRole] = React.useState('');
            const [subscription, setSubscription] = React.useState(false);
            const [rememberMe, setRememberMe] = React.useState(false);
            const [error, setError] = React.useState('');

            const handleLogin = () => {
                // Perform validation
                const passwordRegex = /^(?=.*[A-Z])(?=.*[0-9])(?=.*[!@#$%^&*()_+|~=\`{}\[\]:";'<>?,.\/]).{8,}$/;
                if (!passwordRegex.test(password)){
                    setError('Password must be at least 8 characters long, contain at least one uppercase letter, one number, and one special character');
                    return;
                }
                if (password !== confirmPassword) {
                    setError('Passwords do not match');
                    return;
                }
                if (!gender) {
                    setError('Please select a gender');
                    return;
                }
                if (!role) {
                    setError('Please select a role');
                    return;
                }

                // If validation passes, proceed with login
                alert("Login successful!");
                setError('');
            };

            return (
                <form>
                    <h2>Login</h2>
                    <div>
                        <label>Username:</label>
                        <input type="text" value={username} onChange={(e) => setUsername(e.target.value)} />
                    </div>
                    <div>
                        <label>Password:</label>
                        <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} />
                    </div>
                    <div>
                        <label>Confirm Password:</label>
                        <input type="password" value={confirmPassword} onChange={(e) => setConfirmPassword(e.target.value)} />
                    </div>
                    <div>
                        <label>Gender:</label>
                        <select value={gender} onChange={(e) => setGender(e.target.value)}>
                            <option value="">Select</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div>
                        <label>Role:</label>
                        <div>
                            <label>Admin
                                <input type="radio" value="admin" id="c1" checked={role === 'admin'} onChange={(e) => setRole(e.target.value)}/>
                            </label>
                        </div>
                        <div>
                            <label>User
                                <input
                                    type="radio" value="user" id="c2" checked={role === 'user'} onChange={(e) => setRole(e.target.value)}/>
                            </label>
                        </div>
                    </div>
                    <div>
                        <label>Subscription:</label>
                        <input type="checkbox" checked={subscription} onChange={(e) => setSubscription(e.target.checked)}/>
                    </div>
                    <div>
                        <label>Remember Me:</label>
                        <input type="checkbox" checked={rememberMe} onChange={(e) => setRememberMe(e.target.checked)}/>
                    </div>
                        {error && <div className="error">{error}
                    </div>}
                    <button type="button" onClick={handleLogin}>Login</button>
                </form>
            );
        }

        ReactDOM.render(<LoginForm />, document.getElementById('root'));
    </script>
</body>
</html>
