<html>
	<head>
 		<title>DOM manipulations</title>
		<style>
            .newdiv{
                border-radius: 10px;
                background-color: aqua;
                border: 3px solid blue;
            }
            .mydiv{
                border: 2px solid blue;
                margin: 5px 0px;
            }
            .newclass2{
                border-radius: 20px;
            }
            
        </style>
	</head>
	<body>
        <h2>DOM 3</h2>
        <p>This is a Paragraph outside division</p>
        <button id="btn1">Add Class</button>
        <button id="btn2">Remove Class</button>
        <button id="btn3">Toggle Class</button>
        <button id="btn4">CSS</button>
        

        <div id="firstdiv" class="mydiv">
            <p id="p1" class="para">This is a 1st Paragraph in first division</p>
            <p id="p2">This is a 2nd Paragraph in first division</p>
        </div>
        <div id="seconddiv" class="mydiv">
            <p>This is a 1st Paragraph in second division</p>
            <p>This is a 2nd Paragraph in first division</p>
        </div>
        
        

        <script src="./jquery-3.7.1.js" type="text/javascript"></script>
        <script>
            $(document).ready(function () {
                
                $("#btn1").click(function (){
                    $("#firstdiv").addClass("newdiv");

                }); 
                $("#btn2").click(function (){
                    $("#firstdiv").removeClass("newdiv");
                 
                });
                $("#btn3").click(function (){
                    $("#firstdiv").toggleClass("newdiv newclass2");
                });
                $("#btn4").click(function (){
                    alert($("#firstdiv").css("font-size"));
                });

                
                
            });
        </script>
	</body>
</html>
