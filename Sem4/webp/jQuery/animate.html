<html>
	<head>
 		<title>jQuery Effects</title>
		<style>
            div{
                border: 2px solid blue;
                margin: 5px 0px;
            }
            .mycube{
                width: 100px;
                height: 100px;
                background-color: blueviolet;
                opacity: 0.4;
                position: absolute;
            }
        </style>
	</head>
	<body>
        <h2>Events in jQuery</h2>
        <p>This is a Paragraph outside division</p>
        <button id="btn1">Click Me</button>
        <button id="btn2">Click Me 2</button>
        <button id="btn3">Animate</button>

        <div id="firstdiv" class="mydiv">
            <p>This is a 1st Paragraph in first division</p>
            <p>This is a 2nd Paragraph in first division</p>
        </div>
        <div id="seconddiv" class="mydiv">
            <p>This is a 1st Paragraph in second division</p>
            <p>This is a 2nd Paragraph in first division</p>
        </div>
        <div id="thirddiv" class="mydiv">
            <ul>
                <li>list item 1</li>
                <li>list item 2</li>
                <li>list item 3</li>
            </ul>
        </div>
        <div id="mycube">
            <p>CUBE</p>
        </div>

        <script src="./jquery-3.7.1.js" type="text/javascript"></script>
        <script>
            $(document).ready(function () {
                $("#btn3").click(function(){
                    $("#mycube").animate({
                        left:'150px',
                        width:'100px',
                        height:'100px',
                        opacity:'1'
                    },1000)
                });
                
            })
            
        </script>
	</body>

</html>
